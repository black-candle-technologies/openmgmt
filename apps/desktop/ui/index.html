<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#101410" />
    <title>OpenMgmt</title>
    <link data-trunk rel="css" href="styles.css" />
    <script>
      // Decide board mode before first paint so the dedicated TV window is dark
      // immediately and never flashes a white/blank screen. The query string is
      // the primary signal; the injected global is a fallback.
      (function () {
        var search = window.location.search || "";
        var params = new URLSearchParams(search);
        var isBoard =
          params.get("board") === "1" ||
          params.get("mode") === "board" ||
          window.__OPENMGMT_BOARD__ === true;
        if (isBoard) {
          window.__OPENMGMT_BOARD__ = true;
          document.documentElement.setAttribute("data-board", "1");
        }
        // Early diagnostics so a blank board window can be debugged from the
        // webview console even before the WASM bundle initialises.
        try {
          console.log(
            "[OpenMgmt] board mode:", isBoard,
            "| search:", JSON.stringify(search),
            "| __TAURI__:", typeof window.__TAURI__ !== "undefined"
          );
        } catch (e) {}
      })();
      (function () {
        window.setTimeout(function () {
          var boot = document.getElementById("om-boot");
          if (!boot) return;
          boot.classList.add("failed");
          var details = document.getElementById("om-boot-details");
          if (details) {
            details.textContent = [
              "URL: " + window.location.href,
              "Tauri: " + (typeof window.__TAURI__ !== "undefined"),
              "User agent: " + window.navigator.userAgent
            ].join("\n");
          }
        }, 9000);
      })();
    </script>
    <style>
      /* Critical bootstrap styles: applied before styles.css loads so neither
         window is ever blank white while the WASM bundle initialises. */
      html { background: #f3f2ed; }
      html[data-board] { background: #0d100e; }
      #om-boot {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        font-family: system-ui, "Segoe UI", sans-serif;
        color: #6c756a;
      }
      html[data-board] #om-boot { color: #aeb7ab; }
      .om-boot-inner { display: flex; align-items: center; gap: 10px; opacity: 0.78; }
      #om-boot.failed .om-boot-inner {
        align-items: flex-start;
        background: rgba(255, 255, 255, 0.84);
        border: 1px solid rgba(24, 32, 23, 0.12);
        border-radius: 8px;
        box-shadow: 0 18px 50px rgba(24, 32, 23, 0.12);
        flex-direction: column;
        max-width: min(560px, calc(100vw - 48px));
        padding: 18px;
      }
      html[data-board] #om-boot.failed .om-boot-inner {
        background: rgba(20, 25, 21, 0.92);
        border-color: rgba(201, 239, 106, 0.18);
      }
      .om-boot-mark {
        background: #c9ef6a;
        color: #182017;
        font: 700 12px ui-monospace, monospace;
        padding: 6px 8px;
        border-radius: 4px;
      }
      /* The board variant of the loading label is shown only in board mode. */
      .om-boot-text-board { display: none; }
      html[data-board] .om-boot-text { display: none; }
      html[data-board] .om-boot-text-board { display: inline; }
      .om-boot-failure { display: none; }
      #om-boot.failed .om-boot-failure { display: block; }
      .om-boot-failure-title {
        color: #283025;
        font-size: 18px;
        font-weight: 700;
        margin: 4px 0 6px;
      }
      html[data-board] .om-boot-failure-title { color: #f3f2ed; }
      .om-boot-failure-copy {
        color: #596256;
        font-size: 14px;
        line-height: 1.45;
        margin: 0 0 10px;
      }
      html[data-board] .om-boot-failure-copy { color: #cbd4c8; }
      .om-boot-debug summary {
        cursor: pointer;
        font-size: 13px;
        font-weight: 650;
      }
      .om-boot-debug pre {
        background: rgba(24, 32, 23, 0.07);
        border-radius: 6px;
        font: 12px ui-monospace, "SFMono-Regular", Consolas, monospace;
        margin: 8px 0 0;
        overflow-wrap: anywhere;
        padding: 10px;
        white-space: pre-wrap;
      }
      html[data-board] .om-boot-debug pre { background: rgba(255, 255, 255, 0.08); }
    </style>
  </head>
  <body>
    <!-- Shown until the WASM app has actually mounted (removed in main.rs only
         after a successful mount). Guarantees the window is never a blank white
         surface — or, in board mode, a blank dark surface — even if the bundle
         is slow or panics while mounting. -->
    <div id="om-boot">
      <div class="om-boot-inner">
        <span class="om-boot-mark">OM</span>
        <span class="om-boot-text">Loading OpenMgmt...</span>
        <span class="om-boot-text-board">Loading OpenMgmt Board...</span>
        <div class="om-boot-failure">
          <div class="om-boot-failure-title">OpenMgmt failed to start.</div>
          <p class="om-boot-failure-copy">
            The packaged frontend failed before the app mounted. Check WebView
            console or reinstall.
          </p>
          <details class="om-boot-debug">
            <summary>Debug details</summary>
            <pre id="om-boot-details"></pre>
          </details>
        </div>
      </div>
    </div>
    <!-- Dedicated mount root. Leptos mounts here (never directly into <body>) so
         the boot fallback above can persist until mounting succeeds. -->
    <div id="app"></div>
  </body>
</html>
